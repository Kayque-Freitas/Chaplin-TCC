<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação TCC - Chaplin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100">
    <!-- Navegação -->
    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-2xl font-bold text-orange-500">Chaplin</a>
                <div class="hidden md:flex space-x-8">
                    <a href="/" class="text-gray-300 hover:text-orange-500 transition">Home</a>
                    <a href="/docs/" class="text-gray-300 hover:text-orange-500 transition">Documentação</a>
                    <a href="/slides/" class="text-orange-500 font-semibold">Apresentação</a>
                    <a href="/users/login/" class="text-gray-300 hover:text-orange-500 transition">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Cabeçalho -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold mb-2 text-white">🎓 Apresentação TCC</h1>
            <p class="text-lg text-gray-400">Chaplin - Plataforma de Gestão de Tarefas de Manutenção</p>
        </div>

        <!-- Container de Slides -->
        <div class="bg-gray-800 rounded-lg shadow-2xl overflow-hidden">
            <!-- Viewer de Slides -->
            <div class="aspect-video bg-black flex items-center justify-center">
                <iframe id="slide-viewer" src="/static/slides/slide_01_capa.html" class="w-full h-full border-0"></iframe>
            </div>

            <!-- Controles -->
            <div class="bg-gray-800 p-6 border-t border-gray-700">
                <div class="flex items-center justify-between mb-4">
                    <button id="prev-btn" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded-lg transition">
                        ← Anterior
                    </button>
                    <div class="text-center">
                        <p class="text-gray-300">Slide <span id="current-slide">1</span> de <span id="total-slides">14</span></p>
                    </div>
                    <button id="next-btn" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded-lg transition">
                        Próximo →
                    </button>
                </div>

                <!-- Barra de Progresso -->
                <div class="w-full bg-gray-700 rounded-full h-2">
                    <div id="progress-bar" class="bg-orange-500 h-2 rounded-full transition-all duration-300" style="width: 7.14%"></div>
                </div>
            </div>
        </div>

        <!-- Índice de Slides -->
        <div class="mt-12">
            <h2 class="text-2xl font-bold mb-6 text-white">📑 Índice de Slides</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Slide 1 -->
                <button onclick="goToSlide(1)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 1</p>
                    <p class="text-gray-300 text-sm">Capa</p>
                </button>

                <!-- Slide 2 -->
                <button onclick="goToSlide(2)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 2</p>
                    <p class="text-gray-300 text-sm">Índice</p>
                </button>

                <!-- Slide 3 -->
                <button onclick="goToSlide(3)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 3</p>
                    <p class="text-gray-300 text-sm">Problemática</p>
                </button>

                <!-- Slide 4 -->
                <button onclick="goToSlide(4)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 4</p>
                    <p class="text-gray-300 text-sm">Justificativa</p>
                </button>

                <!-- Slide 5 -->
                <button onclick="goToSlide(5)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 5</p>
                    <p class="text-gray-300 text-sm">Caso de Uso</p>
                </button>

                <!-- Slide 6 -->
                <button onclick="goToSlide(6)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 6</p>
                    <p class="text-gray-300 text-sm">Fluxo de Tarefa</p>
                </button>

                <!-- Slide 7 -->
                <button onclick="goToSlide(7)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 7</p>
                    <p class="text-gray-300 text-sm">Fluxo Proposto</p>
                </button>

                <!-- Slide 8 -->
                <button onclick="goToSlide(8)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 8</p>
                    <p class="text-gray-300 text-sm">Fluxo de Pagamento</p>
                </button>

                <!-- Slide 9 -->
                <button onclick="goToSlide(9)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 9</p>
                    <p class="text-gray-300 text-sm">Requisitos Funcionais 1</p>
                </button>

                <!-- Slide 10 -->
                <button onclick="goToSlide(10)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 10</p>
                    <p class="text-gray-300 text-sm">Requisitos Funcionais 2</p>
                </button>

                <!-- Slide 11 -->
                <button onclick="goToSlide(11)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 11</p>
                    <p class="text-gray-300 text-sm">Requisitos Não-Funcionais</p>
                </button>

                <!-- Slide 12 -->
                <button onclick="goToSlide(12)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 12</p>
                    <p class="text-gray-300 text-sm">Arquitetura</p>
                </button>

                <!-- Slide 13 -->
                <button onclick="goToSlide(13)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 13</p>
                    <p class="text-gray-300 text-sm">Cronograma</p>
                </button>

                <!-- Slide 14 -->
                <button onclick="goToSlide(14)" class="slide-btn bg-gray-800 hover:bg-gray-700 border-2 border-gray-700 hover:border-orange-500 p-4 rounded-lg text-left transition group">
                    <p class="text-orange-500 font-bold group-hover:text-orange-400">Slide 14</p>
                    <p class="text-gray-300 text-sm">Conclusão</p>
                </button>
            </div>
        </div>

        <!-- Instruções -->
        <div class="mt-12 bg-gray-800 border-l-4 border-orange-500 p-6 rounded">
            <h3 class="text-xl font-bold text-white mb-4">⌨️ Atalhos de Teclado</h3>
            <div class="grid md:grid-cols-2 gap-4 text-gray-300 text-sm">
                <div>
                    <p><strong>Seta Esquerda</strong> - Slide anterior</p>
                    <p><strong>Seta Direita</strong> - Próximo slide</p>
                </div>
                <div>
                    <p><strong>Home</strong> - Primeiro slide</p>
                    <p><strong>End</strong> - Último slide</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const slides = [
            '/static/slides/slide_01_capa.html',
            '/static/slides/slide_02_indice.html',
            '/static/slides/slide_03_problematica.html',
            '/static/slides/slide_04_justificativa.html',
            '/static/slides/slide_05_caso_uso.html',
            '/static/slides/slide_06_fluxo_tarefa.html',
            '/static/slides/slide_07_fluxo_proposta.html',
            '/static/slides/slide_08_fluxo_pagamento.html',
            '/static/slides/slide_09_requisitos_func_1.html',
            '/static/slides/slide_10_requisitos_func_2.html',
            '/static/slides/slide_11_requisitos_nao_func.html',
            '/static/slides/slide_12_arquitetura.html',
            '/static/slides/slide_13_cronograma.html',
            '/static/slides/slide_14_conclusao.html'
        ];

        let currentSlide = 1;

        function updateSlide() {
            const viewer = document.getElementById('slide-viewer');
            viewer.src = slides[currentSlide - 1];
            document.getElementById('current-slide').textContent = currentSlide;
            document.getElementById('progress-bar').style.width = (currentSlide / slides.length * 100) + '%';
        }

        function goToSlide(n) {
            if (n > 0 && n <= slides.length) {
                currentSlide = n;
                updateSlide();
            }
        }

        function nextSlide() {
            if (currentSlide < slides.length) {
                currentSlide++;
                updateSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 1) {
                currentSlide--;
                updateSlide();
            }
        }

        // Event listeners
        document.getElementById('next-btn').addEventListener('click', nextSlide);
        document.getElementById('prev-btn').addEventListener('click', prevSlide);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'Home') goToSlide(1);
            if (e.key === 'End') goToSlide(slides.length);
        });
    </script>
</body>
</html>
