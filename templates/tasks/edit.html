{% extends "base.html" %}

{% block title %}Editar Tarefa - Chaplin{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="text-3xl font-bold mb-8">Editar Tarefa</h1>

    <div class="card">
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="flex gap-4">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="{% url 'tasks:detail' task.id %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
