{% extends "base.html" %}

{% block title %}Registrar Conclusão - Chaplin{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="text-3xl font-bold mb-8">Registrar Conclusão da Tarefa</h1>

    <div class="card">
        <h2 class="text-xl font-bold mb-4">{{ task.title }}</h2>
        <p class="text-gray-600 mb-6">{{ task.description }}</p>

        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">O que foi feito? *</label>
                <textarea name="description" id="description" required rows="5" placeholder="Descreva o trabalho realizado..." class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500"></textarea>
            </div>

            <div>
                <label for="photo" class="block text-sm font-medium text-gray-700">Foto de Evidência (Depois) *</label>
                <input type="file" name="photo" id="photo" required accept="image/*" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div class="flex gap-4">
                <button type="submit" class="btn btn-primary">Registrar Conclusão</button>
                <a href="{% url 'tasks:detail' task.id %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
