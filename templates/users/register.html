{% extends "base.html" %}

{% block title %}Registrar - Chaplin{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-gray-900">Criar Conta</h2>
            <p class="mt-2 text-gray-600">Plataforma de Gestão de Tarefas</p>
        </div>

        <form method="post" class="mt-8 space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="first_name" class="block text-sm font-medium text-gray-700">Nome</label>
                <input type="text" name="first_name" id="first_name" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500">
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Usuário</label>
                <input type="text" name="username" id="username" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" name="email" id="email" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
                <input type="password" name="password" id="password" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500">
            </div>

            <button type="submit" class="w-full btn btn-primary">Registrar</button>
        </form>

        <p class="text-center text-gray-600">
            Já tem conta? <a href="{% url 'users:login' %}" class="text-orange-500 hover:text-orange-600">Faça login</a>
        </p>
    </div>
</div>
{% endblock %}
